domain_security_considerations:
  sensitive_areas:
    - area: DOCKERHUB_TOKEN secret
      location: .github/workflows/docker-publish.yml:17
      concern: >
        Stored as GitHub Actions secret; follows least-privilege pattern. Consider scoping to
        write-only access on the target repository. Token rotation policy should be defined.
    - area: Grails environment config in WAR
      location: grails-app/conf/application.yml
      concern: >
        The WAR bundles ALL environment configs (staging DB URLs, potential staging credentials).
        Do not put real credentials in application.yml; inject them at runtime via env vars or
        Spring Boot externalized config. Current staging config uses in-memory H2 only — no risk.
  authentication_patterns_in_domain: >
    Docker Hub push: DOCKERHUB_USERNAME + DOCKERHUB_TOKEN secrets via docker/login-action.
    GHCR push (if adopted): GITHUB_TOKEN (built-in, no secret needed, zero credential management).
  authorization_patterns_in_domain: >
    Current: Docker Hub public repository — any authenticated user can pull.
    GHCR alternative: public package inherits repository visibility; private inherits repo permissions.
  data_validation_in_domain: N/A

