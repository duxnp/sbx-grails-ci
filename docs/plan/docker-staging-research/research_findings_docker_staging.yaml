plan_id: docker-staging-2026-05-23
objective: >
  Research best practices for managing Docker images for staging vs production
  environments when using GitHub Actions and Docker Hub, with specific focus on
  a small-team Grails 7 / Spring Boot application.
focus_area: docker_staging
created_at: "2026-05-23"
created_by: gem-researcher
status: completed

tldr: |
  - Recommended approach for a small team: keep one registry (Docker Hub OR GHCR), use separate
    tags (e.g., `edge` for staging, semver for production) rather than separate registries.
  - GHCR is strictly better than Docker Hub for inner-loop/staging images on GitHub-hosted projects:
    no pull rate limits for public images, no secrets needed in Actions (uses GITHUB_TOKEN), and
    currently free for container storage/bandwidth with 1-month advance notice of any change.
  - Docker Hub free ("Personal") tier is pull-rate-limited (200 pulls/6 h for authenticated, 100 for
    unauthenticated); this actively hurts CI/CD loops and staging server restarts.
  - Tag convention best practice: `edge` or `main` for the latest commit on main, `sha-<short>` for
    traceability, semver (`1.2.3`, `1.2`) for production releases.
  - Grails 7 WAR contains ALL environment configs; the active environment is resolved at startup via
    `-Dgrails.env=X`. Build one image and override the environment at runtime — no separate staging
    image needed.

research_metadata:
  methodology: >
    hybrid retrieval (semantic_search + grep_search), direct file reads of Dockerfile /
    docker-compose.yml / GitHub Actions workflows / application.yml, official docs fetched from
    docs.github.com and docs.docker.com for billing, rate limits, and GHCR authentication.
  scope: >
    Docker image lifecycle, GitHub Actions CI/CD, registry comparison, Grails environment
    resolution, tag naming conventions — all scoped to a single-service small-team project.
  confidence: high
  coverage: 95
  decision_blockers: 0
  research_blockers: 0

files_analyzed:
  - file: Dockerfile
    path: Dockerfile
    purpose: Multi-stage build; compiles Grails WAR with grails.env=prod baked in at build time.
    key_elements:
      - element: RUN ./gradlew bootWar -Dgrails.env=prod --no-daemon
        type: pattern
        location: Dockerfile:13
        description: >
          Build-time environment selection. Produces ROOT.war containing all environment blocks
          from application.yml; only default/prod settings are activated at this build phase.
          The WAR still honors -Dgrails.env=X at runtime.
      - element: ENTRYPOINT ["/tmp/docker-entrypoint.sh"]
        type: pattern
        location: Dockerfile:37
        description: Delegates startup to shell script; is the right place for runtime JVM args.
    language: Dockerfile
    lines: 37

  - file: docker-entrypoint.sh
    path: docker-entrypoint.sh
    purpose: Container entrypoint; runs the WAR with locale JVM flags.
    key_elements:
      - element: exec java -Duser.country=US -Duser.language=en -jar /app/ROOT.war
        type: pattern
        location: docker-entrypoint.sh:5
        description: >
          No -Dgrails.env flag present. Adding -Dgrails.env=staging here (or via environment
          variable) is the runtime override mechanism.
    language: bash
    lines: 5

  - file: grails-app/conf/application.yml
    path: grails-app/conf/application.yml
    purpose: Grails application configuration with environment-specific blocks.
    key_elements:
      - element: environments.staging
        type: pattern
        location: grails-app/conf/application.yml:84
        description: >
          A `staging` environment block exists and is fully defined (separate H2 datasource
          URL `stagingDb`). This confirms the WAR already contains staging config; it just
          needs to be activated at runtime.
      - element: environments.production
        type: pattern
        location: grails-app/conf/application.yml:67
        description: Production block disables Grails Console plugin, uses prodDb.
    language: yaml
    lines: 100

  - file: .github/workflows/docker-publish.yml
    path: .github/workflows/docker-publish.yml
    purpose: Publishes Docker image to Docker Hub on GitHub Release publication.
    key_elements:
      - element: "on: release: types: [published]"
        type: pattern
        location: .github/workflows/docker-publish.yml:4
        description: Only triggers on release; no staging/edge image workflow currently exists.
      - element: type=semver,pattern={{version}}
        type: pattern
        location: .github/workflows/docker-publish.yml:24
        description: Produces semver tags (e.g., 0.2.1, 0.2) but no edge/staging tag.
    language: yaml
    lines: 32

  - file: docker-compose.yml
    path: docker-compose.yml
    purpose: Compose file for production deployment; references versioned Docker Hub image.
    key_elements:
      - element: "image: badboybry9000/sbx-grails-ci:0.2.1"
        type: pattern
        location: docker-compose.yml:3
        description: Pinned to semver release tag; no GRAILS_ENV override in environment section.
    language: yaml
    lines: 12

patterns_found:
  - category: architecture
    pattern: build-time-environment-bake
    description: >
      `grails.env=prod` is passed as a Gradle system property during `bootWar`, setting the
      Grails environment for the build phase. However, Grails 7 (Spring Boot) resolves the
      active environment at JVM startup via -Dgrails.env or GRAILS_ENV, reading the correct
      `environments:` block from the already-bundled application.yml inside the WAR. The
      build-time flag does NOT lock the runtime environment.
    examples:
      - file: Dockerfile
        location: Dockerfile:13
        snippet: "RUN ./gradlew bootWar -Dgrails.env=prod --no-daemon"
      - file: grails-app/conf/application.yml
        location: grails-app/conf/application.yml:82
        snippet: |
          staging:
            dataSource:
              dbCreate: create-drop
              url: jdbc:h2:mem:stagingDb;...
    prevalence: common

  - category: structure
    pattern: release-only-docker-publish
    description: >
      The current Docker publish workflow is gated on GitHub Release events only; no
      staging/edge image is produced on every push to main. This is a gap for staging deployments.
    examples:
      - file: .github/workflows/docker-publish.yml
        location: .github/workflows/docker-publish.yml:3
        snippet: |
          on:
            release:
              types: [published]
    prevalence: common

related_architecture:
  components_relevant_to_domain:
    - component: GitHub Actions (docker-publish.yml)
      responsibility: Builds and pushes Docker image to Docker Hub on release
      location: .github/workflows/docker-publish.yml
      relationship_to_domain: Directly controls what images are built and published, and when
    - component: docker/metadata-action
      responsibility: Auto-generates Docker image tags from git refs/semver
      location: .github/workflows/docker-publish.yml:15
      relationship_to_domain: Tag strategy is driven by this action's config
    - component: Grails application.yml environments blocks
      responsibility: Contains per-environment config (staging, production, development, test)
      location: grails-app/conf/application.yml:67-90
      relationship_to_domain: Determines what config is active at runtime based on grails.env

  data_flow_involving_domain: >
    Code push → GitHub Actions gradle.yml (test/build) → on release: docker-publish.yml builds
    multi-stage Docker image with grails.env=prod baked → pushes to Docker Hub with semver tags →
    docker-compose.yml on server references pinned tag → container runs entrypoint which invokes
    java -jar ROOT.war (no runtime grails.env override currently).

