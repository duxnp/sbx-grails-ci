# ============================================================
# RESEARCH FINDINGS: TOP APPROACHES (factual, no implementation)
# ============================================================

approaches:
  approach_1_ghcr_split_registry:
    name: "Staging → ghcr.io, Production → Docker Hub"
    description: >
      Push staging/edge images to GitHub Container Registry (ghcr.io) on every push to main.
      Keep Docker Hub exclusively for production semver releases.
    trigger: push to main branch → ghcr.io edge image; GitHub Release → Docker Hub semver image
    tags:
      ghcr: "ghcr.io/<owner>/sbx-grails-ci:edge, ghcr.io/<owner>/sbx-grails-ci:sha-<sha7>"
      dockerhub: "badboybry9000/sbx-grails-ci:1.2.3, badboybry9000/sbx-grails-ci:1.2"
    pros:
      - GHCR uses GITHUB_TOKEN — zero secret management for staging builds
      - GHCR public images have no pull rate limits (confirmed current policy; 1-month notice required before change)
      - Staging churn does not pollute Docker Hub repository or consume Docker Hub pull quota
      - GHA build cache (type=gha) works identically for both registries
      - Image is automatically linked to the GitHub repository (visibility, access control inherit from repo)
      - Separates concerns: staging = experimental (ghcr.io), production = stable (Docker Hub)
    cons:
      - Two registries to maintain; operators must know which to pull from
      - GHCR container storage is currently free but not guaranteed (docs state 1-month notice policy)
      - Public GHCR images require a GitHub account-scoped namespace; image visibility defaults to private until changed
    verdict_for_small_team: RECOMMENDED for small teams already on GitHub

  approach_2_dockerhub_dual_tag:
    name: "Single registry (Docker Hub), dual-tag strategy"
    description: >
      Push both staging and production images to Docker Hub. Use `edge` or `main` tag for
      staging and semver for production. Both workflows share the same registry.
    trigger: push to main → :edge tag; GitHub Release → semver tags
    tags:
      staging: "badboybry9000/sbx-grails-ci:edge, badboybry9000/sbx-grails-ci:sha-<sha7>"
      production: "badboybry9000/sbx-grails-ci:1.2.3, badboybry9000/sbx-grails-ci:1.2"
    pros:
      - Single registry; operators only need to know one domain
      - Simpler mental model; all images in one place
      - Consistent docker-compose.yml structure regardless of environment
    cons:
      - Docker Hub Personal account: 200 pulls/6h rate limit; staging CI loops and restarts eat into this
      - Requires DOCKERHUB_TOKEN secret for every staging push (runs on every main commit)
      - Free Personal account allows only 1 private repository; staging image in same public repo exposes it
      - No logical separation between "ready to release" (production) and "latest CI commit" (staging)
    verdict_for_small_team: Workable but friction-heavy on Docker Hub free tier

  approach_3_ghcr_only:
    name: "Migrate fully to ghcr.io (drop Docker Hub)"
    description: >
      Publish all images (staging and production) exclusively to ghcr.io.
    trigger: push to main → :edge + sha; GitHub Release → semver tags on ghcr.io
    tags:
      all: "ghcr.io/<owner>/sbx-grails-ci:edge, ghcr.io/<owner>/sbx-grails-ci:1.2.3"
    pros:
      - Zero Docker Hub dependency; no pull rate limits for public images
      - Single registry, single credential model (GITHUB_TOKEN everywhere)
      - Native GitHub integration (package page linked to repo, CI/CD uses GITHUB_TOKEN)
      - Currently free for container storage and bandwidth
    cons:
      - Docker Hub is more universally recognized by ops/infra teams; ghcr.io requires GitHub account for private pulls
      - Public images on ghcr.io must explicitly be made public (default is private when first pushed)
      - Existing docker-compose.yml and server configuration must be updated
    verdict_for_small_team: Best long-term option; migration cost is low

grails_environment_resolution:
  finding: >
    Grails 7 (Spring Boot) resolves the active environment at JVM startup, not exclusively at build
    time. The `environments:` blocks in application.yml are all bundled into the WAR during `bootWar`.
    The `-Dgrails.env=prod` flag passed to Gradle during build sets the Grails environment for
    any build-phase logic (e.g., BuildConfig, code generation) but does NOT seal the WAR to `prod`
    at runtime. At container startup, passing `-Dgrails.env=staging` as a JVM arg (or setting the
    `GRAILS_ENV` environment variable) activates the staging block from application.yml.
  current_state: >
    docker-entrypoint.sh runs: exec java -Duser.country=US -Duser.language=en -jar /app/ROOT.war
    No -Dgrails.env flag is passed → defaults to production config (since the WAR was built with
    grails.env=prod and no override is present at runtime).
  recommendation: >
    Build ONE image. Override the Grails environment at runtime via the container's environment
    section in docker-compose.yml using JAVA_OPTS or an explicit entrypoint arg. This avoids
    maintaining a separate staging Dockerfile or build pipeline.
  runtime_override_mechanism:
    via_jvm_arg: "exec java -Dgrails.env=staging -jar /app/ROOT.war"
    via_env_var: "GRAILS_ENV=staging  (Grails checks this at startup)"
    via_compose_env: |
      environment:
        JAVA_TOOL_OPTIONS: "-Dgrails.env=staging"
  separate_staging_image_justified_when:
    - Staging has different compiled dependencies or plugins not present in prod
    - Staging requires debug agents (e.g., JVM remote debug port, profiling agents)
    - Team wants to guarantee staging image is byte-for-byte separate from prod for audit/compliance

tag_naming_conventions:
  recommended_set:
    - tag: "edge"
      meaning: Latest commit on main; always moving pointer; analogous to Docker's `latest` for dev
      trigger: push to main
    - tag: "sha-<7char>"
      meaning: Immutable; tied to exact git SHA; enables rollback to any prior staging build
      trigger: push to main (alongside `edge`)
    - tag: "X.Y.Z"
      meaning: Exact semver release; immutable production image
      trigger: GitHub Release published
    - tag: "X.Y"
      meaning: Floating minor semver; points to latest patch of a minor version
      trigger: GitHub Release published
  avoid:
    - tag: "latest"
      reason: >
        Ambiguous — could mean staging or production depending on when it was pushed. Existing
        docker/metadata-action config does not produce `latest`; keep it that way.
    - tag: "staging"
      reason: >
        Semantically tied to an environment rather than a branch state; `edge` better conveys
        "tip of main." `staging` as a tag name can be confused with `staging` as a deployment target.

github_actions_trigger_strategy:
  staging_build:
    trigger: "on: push: branches: [main]"
    rationale: >
      Produces a new edge image on every merge to main. This means the staging environment can
      always be updated to the latest code without waiting for a formal release. SHA tag provides
      traceability. Works well with the existing release-please flow (release-please PR merges to
      main, then edge is built, then release is cut).
    alternative: >
      on: workflow_run (after gradle.yml passes) — ensures staging image is only built when tests
      pass. Adds a small delay but prevents broken images from being pushed.
  production_build:
    trigger: "on: release: types: [published]"
    rationale: Already matches current docker-publish.yml; no change needed.

open_questions:
  - question: >
      Is the production docker-compose.yml pulling the image from Docker Hub directly on the server,
      or via some pull-through cache / Watchtower / Portainer?
    context: >
      If the server uses Watchtower or a similar auto-updater pointed at Docker Hub, the 200-pull
      limit is relevant for the server's pull frequency, not just CI.
    type: nice_to_know
    affects: []
  - question: >
      Does the staging deployment share the same server as production (same docker-compose.yml),
      or will there be a separate staging compose file / host?
    context: >
      If staging runs alongside production on the same host, JAVA_TOOL_OPTIONS or separate
      compose service override is the implementation path. If separate host, the image name/tag
      difference between registries is the key decision.
    type: decision_blocker
    affects: []
  - question: >
      Are there any Grails plugins (e.g., Grails Console, security plugins) that behave differently
      at build time vs runtime based on grails.env?
    context: >
      The application.yml shows `grails.plugin.console.enabled: false` in the production block,
      which is a runtime setting. Build-time-only differences would be the only reason to build
      a separate staging image.
    type: nice_to_know
    affects: []

gaps:
  - area: Staging docker-compose.yml
    description: >
      No staging-specific compose file or service override exists in the repo. Research could
      not determine the intended staging deployment target (separate host, same host, Kubernetes, etc.).
    impact: nice_to_know
    affects: []
  - area: Docker Hub pull limits in production context
    description: >
      Docker Hub usage page confirms Personal (free) accounts have 200 pulls/6h and only 1 private
      repository. If CI pulls eclipse-temurin:25 for the build stage frequently, shared runner
      IP limits may be hit even with authentication. This was not measured empirically.
    impact: research_blocker
    affects: []
  - area: GHCR container registry billing future
    description: >
      GitHub docs explicitly state container image storage is "currently free" with 1-month
      advance notice of policy changes. This introduces minor long-term uncertainty for Approach 1/3.
    impact: nice_to_know
    affects: []
