key_dependencies_at_risk:
  - dependency: "org.apache.grails:grails-bom"
    current_version: "7.0.7 (via grailsVersion in gradle.properties)"
    risk: medium
    notes: >
      Active development framework. Dependabot may or may not update this via property
      variable resolution. Latest Grails 7.x releases should be tracked for security patches.
  - dependency: "io.micronaut.platform:micronaut-platform"
    current_version: "4.10.1 (via micronautPlatformVersion in gradle.properties)"
    risk: medium
    notes: >
      Micronaut 4.x is actively maintained. HTTP client security patches released frequently.
  - dependency: "org.springframework.boot:spring-boot-starter-*"
    current_version: "BOM-managed (Spring Boot 3.x via Grails 7 BOM)"
    risk: high
    notes: >
      Spring Boot receives frequent security CVEs. Version controlled by Grails BOM;
      only updatable indirectly via grailsVersion bump.
  - dependency: "org.grails.plugins:grails-web-console"
    current_version: "7.0.0 (hardcoded)"
    risk: low
    notes: >
      Only hardcoded version in build.gradle. Dependabot will definitely create PRs for this.
  - dependency: "eclipse-temurin:17 / eclipse-temurin:17-jre"
    current_version: "17 (tag)"
    risk: medium
    notes: >
      JDK base image. eclipse-temurin publishes patch tags (17.0.x_y-jdk) regularly for
      security backports. Dependabot docker ecosystem will track these.
  - dependency: "gradle/actions/setup-gradle"
    current_version: "@v4"
    risk: low
    notes: >
      Gradle build action for CI. Updates contain build performance improvements. Low security risk.
  - dependency: "googleapis/release-please-action"
    current_version: "@v5"
    risk: low
    notes: >
      Release automation action. Dependabot will track v5 → v6+ when released.

# ==============================================================================
# LIMITATIONS / GAPS
# ==============================================================================

limitations_and_gaps:
  - title: gradle.properties BOM variable resolution reliability
    description: >
      The two most important version pins (grailsVersion=7.0.7 and micronautPlatformVersion=4.10.1)
      are used as variables in platform() BOM imports in build.gradle. Dependabot for Gradle
      reads gradle.properties and attempts variable substitution, but the documented supported
      file list does not explicitly include gradle.properties — only build.gradle,
      gradle/libs.versions.toml, gradle.lockfile, and applied files with "dependencies" in the name.
      In practice, community reports indicate variable resolution works for simple cases but
      BOM platform() with variable versions is inconsistently handled.
    impact: high
    recommendation: >
      Migrate to gradle/libs.versions.toml version catalog for grailsVersion and micronautPlatformVersion.
      This is the officially documented format with reliable Dependabot support.
      Alternatively, write version literals directly in build.gradle.

  - title: No gradle/libs.versions.toml version catalog
    description: >
      The project does not use a Gradle version catalog (gradle/libs.versions.toml).
      This is the recommended modern pattern for Gradle dependency version management and
      has explicit, documented Dependabot support. The current approach of gradle.properties
      variables has weaker support.
    impact: medium
    recommendation: >
      Consider adopting gradle/libs.versions.toml for explicit Dependabot compatibility.

  - title: Grails restricted Maven repository access
    description: >
      repo.grails.org/grails/restricted requires authentication. Dependabot cannot resolve
      Grails-specific artifacts without a maven-repository registry entry in dependabot.yml.
      Without this, Dependabot may fail to parse/validate Gradle updates involving Grails artifacts.
    impact: high
    recommendation: >
      Add a registries entry in dependabot.yml with type: maven-repository pointing to
      https://repo.grails.org/grails/restricted and reference it in the gradle ecosystem entry.
      Credentials should be stored as GitHub repository secrets.

  - title: Gradle security updates require Dependency Submission API
    description: >
      Dependabot security updates for Gradle are limited — they cannot automatically run Gradle
      to resolve the full transitive dependency graph. To get CVE alerts on transitive deps
      (e.g., a vulnerable version of logback-core pulled in by Spring Boot), the Dependency
      Submission API must be used to upload the dependency graph as part of the CI pipeline.
    impact: medium
    recommendation: >
      Add gradle/actions/dependency-submission@v4 step to .github/workflows/gradle.yml to
      upload the full dependency graph on each push to main. This enables Dependabot security
      alerts and automated security update PRs for transitive dependencies.

  - title: docker-compose.yml tracks project's own image
    description: >
      The only image in docker-compose.yml is the project's own kowalb038/sbx-grails-ci image,
      whose version is managed by release-please. Enabling docker-compose Dependabot would
      conflict with release-please version management.
    impact: low
    recommendation: Either omit docker-compose from dependabot.yml or exclude the image via ignore rules.

  - title: Grails Plugin Portal artifacts may lack pom.xml metadata
    description: >
      Some Grails-specific plugins (e.g., cloud.wondrify:asset-pipeline-gradle) published to the
      Grails restricted repo may have incomplete pom.xml metadata. Dependabot uses pom.xml data
      to add release notes/changelog links to PRs. If pom.xml is absent or incomplete,
      PRs will lack this metadata (not a blocking issue).
    impact: low
    recommendation: No action required; cosmetic limitation only.

# ==============================================================================
# RECOMMENDED dependabot.yml ECOSYSTEM ENTRIES
# ==============================================================================

recommended_ecosystem_entries:
  - package_ecosystem: gradle
    directory: "/"
    schedule: weekly
    notes: >
      Covers build.gradle (direct deps), gradle.properties (version variables, partial reliability),
      and gradle/wrapper/ (Gradle Wrapper). Requires Grails restricted maven-repository registry config.
    requires_registry: true
    registry_type: maven-repository
    registry_url: https://repo.grails.org/grails/restricted

  - package_ecosystem: docker
    directory: "/"
    schedule: weekly
    notes: >
      Tracks eclipse-temurin:17 and eclipse-temurin:17-jre base image tags in Dockerfile.
    requires_registry: false

  - package_ecosystem: github-actions
    directory: "/"
    schedule: weekly
    notes: >
      Tracks all 9 action references across 3 workflow files. Dependabot scans
      .github/workflows/ automatically when directory is "/".
    requires_registry: false

  - package_ecosystem: docker-compose
    directory: "/"
    schedule: N/A
    notes: >
      NOT RECOMMENDED. The only image is the project's own release-please-managed image.
      Either omit entirely or add ignore rule for kowalb038/sbx-grails-ci.
    requires_registry: false

# ==============================================================================
# RAW FILE CONTENTS (for orchestrator use in plan creation)
# ==============================================================================

raw_file_contents:
  build_gradle: |
    buildscript {
        repositories {
            mavenCentral()
            maven {
               url = 'https://repo.grails.org/grails/restricted'
            }
        }
        dependencies { // Not Published to Gradle Plugin Portal
            classpath "cloud.wondrify:asset-pipeline-gradle"
            classpath platform("org.apache.grails:grails-bom:$grailsVersion")
            classpath "org.apache.grails:grails-data-hibernate5"
            classpath "org.apache.grails:grails-gradle-plugins"
        }
    }

    plugins {
        id "war"
        id "idea"
        id "eclipse"
    }

    // Not Published to Gradle Plugin Portal
    apply plugin: "org.apache.grails.gradle.grails-web"
    apply plugin: "org.apache.grails.gradle.grails-gsp"
    apply plugin: "cloud.wondrify.asset-pipeline"
    apply plugin: "org.apache.grails.gradle.grails-gson"

    group = "sbx.grails.ci"

    repositories {
        mavenCentral()
        maven {
           url = 'https://repo.grails.org/grails/restricted'
        }
    }

    dependencies {
        profile "org.apache.grails.profiles:web"
        developmentOnly "org.springframework.boot:spring-boot-devtools"
        testAndDevelopmentOnly "org.webjars.npm:bootstrap"
        testAndDevelopmentOnly "org.webjars.npm:bootstrap-icons"
        testAndDevelopmentOnly "org.webjars.npm:jquery"
        implementation "io.micronaut:micronaut-http-client-jdk"
        implementation platform("io.micronaut.platform:micronaut-platform:$micronautPlatformVersion")
        implementation "io.micronaut.serde:micronaut-serde-jackson"
        implementation platform("org.apache.grails:grails-bom:$grailsVersion")
        implementation "org.apache.grails:grails-cache"
        implementation "org.apache.grails:grails-core"
        implementation "org.apache.grails:grails-data-hibernate5"
        implementation "org.apache.grails:grails-data-mongodb-gson-templates"
        implementation "org.apache.grails:grails-databinding"
        implementation "org.apache.grails:grails-events"
        implementation "org.apache.grails:grails-gsp"
        implementation "org.apache.grails:grails-interceptors"
        implementation "org.apache.grails:grails-layout"
        implementation "org.apache.grails:grails-logging"
        implementation "org.apache.grails:grails-rest-transforms"
        implementation "org.apache.grails:grails-scaffolding"
        implementation "org.apache.grails:grails-services"
        implementation "org.apache.grails:grails-url-mappings"
        implementation "org.apache.grails:grails-views-gson"
        implementation "org.apache.grails:grails-web-boot"
        implementation "org.springframework.boot:spring-boot-autoconfigure"
        implementation "org.springframework.boot:spring-boot-starter"
        implementation "org.springframework.boot:spring-boot-starter-actuator"
        implementation "org.springframework.boot:spring-boot-starter-logging"
        implementation "org.springframework.boot:spring-boot-starter-tomcat"
        implementation "org.springframework.boot:spring-boot-starter-validation"
        console "org.apache.grails:grails-console"
        runtimeOnly "cloud.wondrify:asset-pipeline-grails"
        runtimeOnly "com.h2database:h2"
        runtimeOnly "com.zaxxer:HikariCP"
        runtimeOnly "org.fusesource.jansi:jansi"
        runtimeOnly "org.grails.plugins:grails-web-console:7.0.0"
        integrationTestImplementation testFixtures("org.apache.grails:grails-geb")
        testImplementation "org.apache.grails:grails-testing-support-datamapping"
        testImplementation "org.apache.grails:grails-testing-support-views-gson"
        testImplementation "org.apache.grails:grails-testing-support-web"
        testImplementation "org.spockframework:spock-core"
    }

    compileJava.options.release = 17

    tasks.withType(Test).configureEach {
        useJUnitPlatform()
    }

    assets {
        excludes = [
                'webjars/jquery/**',
                'webjars/bootstrap/**',
                'webjars/bootstrap-icons/**'
        ]
        includes = [
                'webjars/jquery/*/dist/jquery.js',
                'webjars/bootstrap/*/dist/js/bootstrap.bundle.js',
                'webjars/bootstrap/*/dist/css/bootstrap.css',
                'webjars/bootstrap-icons/*/font/bootstrap-icons.css',
                'webjars/bootstrap-icons/*/font/fonts/*',
        ]
    }

    tasks.withType(GroovyCompile).configureEach {
        groovyOptions.optimizationOptions.indy = false
    }

    bootWar {
        archiveVersion = ""
        archiveFileName = "ROOT.war"
    }

  gradle_properties: |
    grailsVersion=7.0.7
    micronautPlatformVersion=4.10.1
    # x-release-please-start-version
    version=0.2.1
    # x-release-please-end-version
    org.gradle.caching=true
    org.gradle.daemon=true
    org.gradle.parallel=true
    org.gradle.jvmargs=-Dfile.encoding=UTF-8 -Xmx1024M

open_questions:
  - question: >
      Does Dependabot reliably update grailsVersion and micronautPlatformVersion in
      gradle.properties when they are used as platform() BOM variables in build.gradle?
    context: >
      The docs list build.gradle and gradle/libs.versions.toml as supported files, but NOT
      gradle.properties explicitly. Community reports suggest partial support exists. This
      needs empirical verification before counting on Dependabot to manage these critical
      framework versions.
    type: decision_blocker
    affects: ["gradle-ecosystem-config"]

  - question: >
      Does the Grails restricted Maven repo (repo.grails.org/grails/restricted) require
      authentication for read access, or is it publicly readable?
    context: >
      The URL contains "restricted" which suggests authentication may be required. If public
      read is allowed, the registry configuration in dependabot.yml may not be mandatory
      (though still recommended for reliability).
    type: decision_blocker
    affects: ["gradle-ecosystem-config", "registry-config"]

  - question: >
      Should googleapis/release-please-action Dependabot updates be enabled, given that
      release-please manages the release workflow?
    context: >
      If release-please-action is updated to a breaking major version, the release workflow
      would break. However, patch/minor updates are generally safe. Consider whether to
      restrict release-please-action updates to patch/minor only.
    type: decision_blocker
    affects: ["github-actions-ecosystem-config"]

gaps:
  - area: gradle.properties variable resolution for platform() BOMs
    description: >
      Insufficient empirical data on whether Dependabot creates PRs to update
      grailsVersion and micronautPlatformVersion in gradle.properties. Official docs
      do not explicitly confirm this pattern is supported.
    impact: decision_blocker
    affects: ["gradle-ecosystem-config"]

  - area: Grails restricted repository authentication requirement
    description: >
      Unknown whether repo.grails.org/grails/restricted requires authentication for
      dependency resolution. If it does, dependabot.yml must include a maven-repository
      registry entry; if not, no registry config is needed.
    impact: decision_blocker
    affects: ["registry-config"]

  - area: Dependency Submission API integration
    description: >
      No dependency-submission workflow step currently exists. Without it, Dependabot
      security updates for Gradle will only cover directly declared dependencies
      (not transitive), missing the majority of the resolved dependency tree.
    impact: research_blocker
    affects: ["security-updates-config"]
