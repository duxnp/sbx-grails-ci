name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest

    steps:
      # Validate release lanes so this job only runs from main or release/*.
      # Prevents accidental manual releases from non-release branches.
      - name: Validate release lane
        if: >-
          ${{
            github.ref_name != github.event.repository.default_branch
            && !startsWith(github.ref_name, 'release/')
          }}
        shell: bash
        run: |
          echo "Invalid release lane: ${{ github.ref_name }}"
          echo "Expected `${{ github.event.repository.default_branch }}` or `release/*`."
          exit 1

      - name: Create GitHub App token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.GH_RELEASE_APP_ID }}
          private-key: ${{ secrets.GH_RELEASE_APP_PEM }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-pull-requests: write
          permission-contents: write
          permission-issues: write

      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          target-branch: ${{ github.ref_name }}
          config-file: release-please-config.json
